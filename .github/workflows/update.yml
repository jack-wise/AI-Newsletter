# Collects news every 30 minutes and commits the refreshed data, which GitHub
# Pages (serving /docs on main) picks up automatically.
#
# Notes:
# - GitHub cron is best-effort; runs can start a few minutes late under load.
# - Scheduled workflows pause after ~60 days without repo activity; the
#   collector's own commits keep the repo active.
# - X coverage activates when the X_BEARER_TOKEN secret is set (paid X API
#   Basic tier or above; the free tier cannot search).

name: update-newsletter

on:
  schedule:
    # BACKUP ONLY: GitHub's scheduler proved unreliable for this repo (one
    # schedule run in the first ~20h, even on off-peak minutes), so the
    # primary cadence is the fermi-watch-pinger Cloudflare Worker cron
    # (pinger-worker/) firing workflow_dispatch at :01/:31. This stays as a
    # free backup; the concurrency group de-races any double-fire.
    - cron: "7,37 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-newsletter
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # The `secrets` context is not allowed in step `if:` expressions, so map it
    # to a job-level env var that `if:` can read.
    env:
      HAS_ANTHROPIC: ${{ secrets.ANTHROPIC_API_KEY != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # The collector is dependency-free, INCLUDING the keyless Cloudflare
      # Workers AI summary path (a plain fetch to FILINGS_WORKER_URL). Only the
      # alternative Anthropic SDK path needs node_modules — install it only when
      # ANTHROPIC_API_KEY is present (skipped on quiet repos and when using the
      # Worker path, so no install cost).
      - name: Install deps (Anthropic filing summaries)
        if: ${{ env.HAS_ANTHROPIC == 'true' }}
        run: npm ci || npm install

      - name: Collect news
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          # Reddit script-app credentials (reddit.com/prefs/apps, type
          # "script"): activates OAuth'd search.json with real post scores for
          # the discovered-tweet vetting. Absent -> keyless search.rss path.
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          # AI summaries of SEC filing CONTENTS (not just the form-type
          # explanation). Preferred KEYLESS path: deploy filings-worker/ and set
          # the FILINGS_WORKER_URL variable + FILINGS_WORKER_SECRET secret —
          # inference runs on your Cloudflare account, no Anthropic key.
          FILINGS_WORKER_URL: ${{ vars.FILINGS_WORKER_URL }}
          FILINGS_WORKER_SECRET: ${{ secrets.FILINGS_WORKER_SECRET }}
          # Alternative backend: set ANTHROPIC_API_KEY instead to summarize via
          # the Anthropic SDK (FILINGS_MODEL var overrides the model). Both
          # absent -> static form explanations. All paths fail open.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FILINGS_MODEL: ${{ vars.FILINGS_MODEL }}
        run: node scripts/collect.mjs

      - name: Commit refreshed data
        run: |
          git config user.name "newsletter-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data
          if git diff --cached --quiet; then
            echo "No changes this cycle."
            exit 0
          fi
          git commit -m "data: refresh $(date -u +'%Y-%m-%dT%H:%MZ')"
          # A concurrent push (e.g. a manual edit) should not kill the cycle.
          git pull --rebase origin main
          git push origin main
