# Fermi Watch email digest worker.
# Deploy:  cd email-worker && npx wrangler deploy
# Secret:  npx wrangler secret put BREVO_API_KEY
name = "fermi-watch-email"
main = "worker.js"
compatibility_date = "2026-07-07"

[triggers]
# 0 11 * * *  -> daily ~7am ET (11:00 UTC) morning brief. The news collector and
#               the AI report already run earlier, so the digest has fresh data.
crons = ["0 11 * * *"]

# Subscriber list. Create the namespace once, then paste its id here:
#   npx wrangler kv namespace create SUBSCRIBERS
[[kv_namespaces]]
binding = "SUBSCRIBERS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[vars]
# Verified Brevo sender address (Brevo dashboard -> Senders). REQUIRED.
FROM_EMAIL = "REPLACE_WITH_VERIFIED_SENDER@example.com"
FROM_NAME = "Fermi Watch"
SITE_URL = "https://jack-wise.github.io/AI-Newsletter"
ALLOWED_ORIGIN = "https://jack-wise.github.io"
# This worker's own public URL — used to build confirm/unsubscribe links in the
# daily digest (the scheduled run has no request URL to derive it from). Set to
# the deployed URL after the first deploy, e.g.
#   https://fermi-watch-email.<your-subdomain>.workers.dev
WORKER_ORIGIN = "https://fermi-watch-email.REPLACE.workers.dev"

[observability]
enabled = true
