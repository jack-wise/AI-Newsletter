# Research reports via the Claude API with web search, published to the site's
# Reports tab. The SCHEDULE runs only the daily news read; earnings is
# generated on demand via Run workflow (leave the input empty to run all
# Claude-owned keys, or pass comma-separated keys). banker + market are
# published by the queequeg agent committing the JSON directly (#2).
#
# Requires the ANTHROPIC_API_KEY secret (console.anthropic.com). Without it the
# script exits cleanly with a "skipped" note. Optional: REPORTS_MODEL variable
# to override the model (default claude-opus-4-8).

name: generate-reports

on:
  schedule:
    - cron: "30 10 * * 1-5" # 10:30 UTC ≈ 6:30am ET, weekdays
  workflow_dispatch:
    inputs:
      report:
        description: "Single report key to run (news|earnings); empty = all Claude-owned reports"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: generate-reports
  cancel-in-progress: false

jobs:
  reports:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install SDK
        run: npm ci || npm install

      - name: Generate reports
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPORTS_MODEL: ${{ vars.REPORTS_MODEL }}
        # Scheduled runs generate ONLY the daily news read; manual dispatch
        # runs the requested keys (or all four when the input is empty).
        run: node scripts/reports.mjs ${{ github.event_name == 'schedule' && 'news' || inputs.report }}

      - name: Commit reports
        run: |
          if [ ! -d docs/data/reports ]; then
            echo "No reports directory — run was skipped (no API key) or produced nothing."
            exit 0
          fi
          git config user.name "newsletter-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data/reports
          if git diff --cached --quiet; then
            echo "No report changes."
            exit 0
          fi
          git commit -m "reports: refresh $(date -u +'%Y-%m-%dT%H:%MZ')"
          git pull --rebase origin main
          git push origin main
